{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm">
      <div class="card-header d-flex justify-content-between align-items-center">
  <div><strong>My Bank Assistant</strong></div>
        <div class="small text-muted">Type natural language, e.g. <em>transfer 1000 to Ravi</em></div>
      </div>
      <div id="chat" class="chat-window p-3">
        <div class="bot-msg">
          Hi {{ name }} 👋. I can help with balance, transactions, card control, money transfer and loan info.
        </div>
        <div id="quick" class="d-flex flex-wrap gap-2 my-2"></div>
      </div>
      <div class="input-group p-3">
        <input id="msg" class="form-control" placeholder="Ask me anything…">
        <button id="send" class="btn btn-primary">Send</button>
      </div>
    </div>
  </div>
</div>
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
{% endblock %}
