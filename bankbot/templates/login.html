{% extends 'layout.html' %}
{% block content %}
<div class="d-flex justify-content-center">
  <div class="login-card p-4 rounded-4 shadow-lg">
    <div class="text-center mb-3">
  <h2 class="text-primary fw-bold">My Bank</h2>
  <p class="text-muted m-0">Welcome to My Bank</p>
    </div>
    <form method="post">
      <div class="mb-3">
        <label class="form-label text-light">Email</label>
        <div class="input-group">
          <span class="input-group-text">📧</span>
          <input name="email" type="email" class="form-control" placeholder="your@email.com" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label text-light">Password</label>
        <div class="input-group">
          <span class="input-group-text">🔒</span>
          <input name="password" type="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>
      <button class="btn btn-gradient w-100 mb-2">Sign In</button>
      <div class="text-center text-secondary my-2">OR</div>
      <a href="#" class="btn btn-secondary w-100 disabled">Try Demo Account</a>
      <div class="text-center mt-3">
        <a href="{{ url_for('signup') }}" class="link-light">Create account</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
